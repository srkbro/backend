<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Dashboard</title>

<style>

/* ====== BASE ====== */

:root{
--bg:#050914;
--glass:rgba(255,255,255,.14);
--border:rgba(255,255,255,.22);
--text:#eef2ff;
--accent:#5ac8fa;
--radius:20px;
--blur:26px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:linear-gradient(180deg,#030712,#060b1a);
color:var(--text);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* ===== LOGIN CARD ===== */

.login{

position:relative;
width:420px;
padding:32px;

background:linear-gradient(180deg,
rgba(255,255,255,.22),
rgba(255,255,255,.06));

backdrop-filter:blur(26px);
border-radius:20px;

border:1px solid rgba(255,255,255,.2);

box-shadow:
0 30px 80px rgba(0,0,0,.45),
inset 0 1px 0 rgba(255,255,255,.4);

overflow:hidden;

transform:skewX(-6deg) rotateX(6deg);

}

/* ===== NEON BORDER ===== */

.login::after{
content:"";
position:absolute;
inset:-2px;

background:linear-gradient(
90deg,
transparent,
#5ac8fa,
transparent
);

animation:borderRun 4s linear infinite;
}

@keyframes borderRun{
0%{transform:translateX(-100%)}
100%{transform:translateX(100%)}
}

/* ===== GLASS SWEEP ===== */

.login::before{

content:"";
position:absolute;
top:0;
left:-120%;
width:80%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.2),
transparent
);

transform:skewX(-25deg);
animation:glassSweep 7s infinite;

}

@keyframes glassSweep{

0%{left:-120%}
60%{left:120%}
100%{left:120%}

}

/* ===== MASK PANEL ===== */

.slideMask{

position:absolute;
top:0;
left:-120%;

width:120%;
height:100%;

background:#020617;

transform:skewX(-20deg);

transition:all .7s cubic-bezier(.77,0,.18,1);

z-index:5;

}

.login.active .slideMask{

left:120%;

}

/* ===== FORM ===== */

h2{margin-top:0}

input{

width:100%;
padding:14px;
margin-top:12px;

border-radius:14px;
border:1px solid rgba(255,255,255,.25);

background:rgba(255,255,255,.1);
color:white;

}

input:focus{
outline:none;
border-color:var(--accent);
box-shadow:0 0 0 4px rgba(90,200,250,.3);
}

.btn{

margin-top:18px;
width:100%;
padding:14px;

border-radius:999px;
border:none;

background:linear-gradient(180deg,#7dd3fc,#38bdf8);

font-weight:600;
cursor:pointer;

}

.hidden{display:none}

/* ===== DASHBOARD ===== */

#dashBox{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
padding:20px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="login">

<div class="slideMask"></div>

<h2>Admin Login</h2>

<input id="email" type="email" placeholder="Admin email">
<input id="password" type="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

<p id="loginMsg"></p>

</div>

<!-- DASHBOARD -->
<div id="dashBox" class="hidden">
<h2>Dashboard Loaded</h2>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script src="firebase-config.js"></script>

<script>

firebase.initializeApp(window.firebaseConfig);

const auth=firebase.auth();

/* LOGIN */

function login(){

loginBox.classList.add("active");

auth.signInWithEmailAndPassword(email.value,password.value)

.then(()=>{

setTimeout(()=>{
loginBox.classList.add("hidden");
dashBox.classList.remove("hidden");
},700)

})

.catch(e=>loginMsg.textContent=e.message)

}

/* ===== 3D TILT ===== */

const card=document.querySelector(".login");

document.addEventListener("mousemove",(e)=>{

const x=(window.innerWidth/2-e.pageX)/40;
const y=(window.innerHeight/2-e.pageY)/40;

card.style.transform=
`skewX(-6deg) rotateY(${x}deg) rotateX(${y}deg)`;

});

document.addEventListener("mouseleave",()=>{

card.style.transform="skewX(-6deg) rotateX(6deg)";

});

/* ===== TOUCH TILT ===== */

card.addEventListener("touchmove",(e)=>{

const t=e.touches[0];

const x=(window.innerWidth/2-t.pageX)/40;
const y=(window.innerHeight/2-t.pageY)/40;

card.style.transform=
`rotateY(${x}deg) rotateX(${y}deg)`;

});

</script>

</body>
</html>
